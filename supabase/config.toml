# FdF — Supabase CLI config (local dev + migration linking)
# Ref ADR-0002 §Decision (Supabase EU), ADR-0003 §3 RLS
# Il project_id si popola con `supabase link --project-ref <ref>` lato CTO Agent
# o CEO durante FDFA-13 (auth + onboarding setup).
project_id = "fdf"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://fdf.gargency.com"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# MFA obbligatoria prima del primo cliente pagante (ADR-0003 §2).
[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[edge_runtime]
enabled = true
policy = "oneshot"

[analytics]
enabled = false
